{% extends "base.html" %}
{% block title %}Sign up{% endblock %}
{% block content %}
  <div class="auth-center">
  <h1>Create an account</h1>
  <p class="subtitle">Your QR codes and scan data are private to your account.</p>
  <div class="card">
    <form method="post">
      <div style="margin-bottom: 14px;">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required autofocus>
      </div>
      <div style="margin-bottom: 14px;">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required>
      </div>
      <div style="margin-bottom: 14px;">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="new-password" required minlength="6">
      </div>
      <div>
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" name="confirm" autocomplete="new-password" required minlength="6">
      </div>
      <div style="margin-top: 18px;">
        <button class="primary" type="submit" style="width: 100%;">Create account</button>
      </div>
    </form>
  </div>
  <p class="below" style="color: var(--text-muted); font-size: 14px;">
    Already have an account? <a class="link" href="{{ url_for('login') }}">Log in</a>
  </p>
  </div>
{% endblock %}
