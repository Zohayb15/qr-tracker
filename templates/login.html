{% extends "base.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
  <div class="auth-center">
  <h1>Log in</h1>
  <p class="subtitle">Access your campaigns and scan data.</p>
  <div class="card">
    <form method="post">
      <div style="margin-bottom: 14px;">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required autofocus>
      </div>
      <div>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <p style="margin: 10px 0 0;"><a class="link" style="font-size: 13px;" href="{{ url_for('forgot_password') }}">Forgot password?</a></p>
      <div style="margin-top: 18px;">
        <button class="primary" type="submit" style="width: 100%;">Log in</button>
      </div>
    </form>
  </div>
  <p class="below" style="color: var(--text-muted); font-size: 14px;">
    Don't have an account? <a class="link" href="{{ url_for('register') }}">Sign up</a>
  </p>
  </div>
{% endblock %}
