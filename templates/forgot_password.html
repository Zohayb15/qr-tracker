{% extends "base.html" %}
{% block title %}Forgot password{% endblock %}
{% block content %}
  <div class="auth-center">
  <h1>Forgot password</h1>
  <p class="subtitle">Enter your account's email and we'll send you a link to reset your password.</p>
  <div class="card">
    <form method="post">
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required autofocus>
      </div>
      <div style="margin-top: 18px;">
        <button class="primary" type="submit" style="width: 100%;">Send reset link</button>
      </div>
    </form>
  </div>
  <p class="below" style="color: var(--text-muted); font-size: 14px;">
    <a class="link" href="{{ url_for('login') }}">Back to log in</a>
  </p>
  </div>
{% endblock %}
