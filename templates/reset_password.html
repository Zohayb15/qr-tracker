{% extends "base.html" %}
{% block title %}Reset password{% endblock %}
{% block content %}
  <div class="auth-center">
  <h1>Set a new password</h1>
  <p class="subtitle">This link is valid for one hour and works only once.</p>
  <div class="card">
    <form method="post">
      <div style="margin-bottom: 14px;">
        <label for="password">New password</label>
        <input type="password" id="password" name="password" autocomplete="new-password" required minlength="6" autofocus>
      </div>
      <div>
        <label for="confirm">Confirm new password</label>
        <input type="password" id="confirm" name="confirm" autocomplete="new-password" required minlength="6">
      </div>
      <div style="margin-top: 18px;">
        <button class="primary" type="submit" style="width: 100%;">Reset password</button>
      </div>
    </form>
  </div>
  </div>
{% endblock %}
